<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 20px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        img {
            width: 120px;
            height: 120px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #message {
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="Car.jpg" alt="Sample Image">

    <h2>User Details</h2>

    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Enter Name">

    <label for="userId">ID</label>
    <input type="text" id="userId" placeholder="Enter ID">

    <label for="interest">Interest</label>
    <input type="text" id="interest" placeholder="Enter Interest">

    <button id="saveBtn">Save</button>

    <p id="message"></p>
</div>

<script src="script.js"></script>

</body>
</html>
